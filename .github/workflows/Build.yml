name: Build OpenWrt for NanoPi NEO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build OpenWrt
        uses: softwaredownload/openwrt-builder@v1
        with:
          branch: v25.12.4
          target: sunxi/cortexa7
          profile: friendlyarm_nanopi-neo
          rootfs_size: 4096
          packages: >
            nano dtc ttyd mc samba4-server luci-app-samba4 docker-ce luci-app-dockerman
            kmod-usb-storage usbutils kmod-usb-serial kmod-usb-serial-option
            kmod-usb-net-qmi-wwan uqmi luci-proto-qmi bluez-daemon bluez-utils
            kmod-bluetooth rtl8xxxu rtl8188eu-firmware rtl8188fu-firmware
            luci-i18n-base-ru luci-i18n-base-bg luci-i18n-base-de iwinfo tcpdump strace ltrace
          config: |
            CONFIG_TARGET_ROOTFS_PARTSIZE=4096
          files: |
            target/linux/sunxi/Makefile:
              sed -i 's/FEATURES:=.*/& dt-overlay/' target/linux/sunxi/Makefile
            target/linux/sunxi/image/cortexa7.mk:
              sed -i '/define Device\/friendlyarm_nanopi-neo/,/endef/ s/^\([ ]*SOC.*\)/\1\n  DEVICE_DTS_OVERLAY := enable-usb2/' target/linux/sunxi/image/cortexa7.mk
            files/enable-usb2.dts:
              /dts-v1/;
              /plugin/;
              / {
                fragment@0 { target = <&ehci2>; __overlay__ { status = "okay"; }; };
                fragment@1 { target = <&ohci2>; __overlay__ { status = "okay"; }; };
              };

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-nanopi-neo
          path: bin/targets/sunxi/cortexa7/*.img.gz
